<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://ce.judge0.com https://firestore.googleapis.com https://*.firebaseio.com; img-src 'self' data:; media-src 'self'; font-src 'self' https://cdn.jsdelivr.net data:;">
  <title>BugSugi - Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<style>
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: -1;
  }

  body {
    text-align: center;
    margin-top: 300px;
  }
</style>

<body>
  <video autoplay muted loop id="bg-video">
    <source src="bug.bg.mp4" type="video/mp4">
  </video>


  <h2 style="font-size: 40px;position: fixed;top: 30px; left: 34%">MVSR Engineering College</h2>
  <h3 style="position: fixed;top: 40px; left: 27%;font-size: 100px">SAMVARTHAN</h3>

  <div id="logdiv">
    <h1 id="h1">Bug Fixing Event</h1>
    <input id="team" placeholder="Team ID" autocomplete="off"><br>
    <input id="pass" type="password" placeholder="Password" autocomplete="off"><br>

    <button id="logbtn" onclick="login()">Login</button>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>

</html>
