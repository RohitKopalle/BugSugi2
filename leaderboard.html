<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://firestore.googleapis.com https://*.firebaseio.com; img-src 'self' data:; font-src 'self' data:;">
  <title>Leaderboard - BugSugi</title>
  <link rel="stylesheet" href="style.css">
</head>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  min-height: 100vh;
}

.leaderboard-container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
  padding: 30px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.title {
  font-size: 48px;
  margin-bottom: 10px;
  background: linear-gradient(45deg, #22c55e, #16a34a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: 18px;
  color: #9ca3af;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.stat-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.stat-number {
  font-size: 36px;
  font-weight: bold;
  color: #22c55e;
  margin-bottom: 5px;
}

.stat-label {
  font-size: 14px;
  color: #9ca3af;
}

.leaderboard-table {
  width: 100%;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  overflow: hidden;
  border-collapse: collapse;
}

.leaderboard-table th {
  background: rgba(34, 197, 94, 0.1);
  color: #22c55e;
  padding: 20px;
  text-align: left;
  font-weight: bold;
  font-size: 16px;
  border-bottom: 2px solid rgba(34, 197, 94, 0.3);
}

.leaderboard-table td {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.leaderboard-table tr:hover {
  background: rgba(255, 255, 255, 0.02);
}

.rank-cell {
  font-size: 18px;
  font-weight: bold;
  width: 80px;
}

.rank-1 { 
  color: #fbbf24; 
  text-shadow: 0 0 10px #fbbf24;
}
.rank-2 { 
  color: #9ca3af; 
  text-shadow: 0 0 10px #9ca3af;
}
.rank-3 { 
  color: #f59e0b; 
  text-shadow: 0 0 10px #f59e0b;
}

.team-cell {
  font-weight: 600;
  color: #22c55e;
}

.time-cell {
  font-family: 'Courier New', monospace;
  color: #60a5fa;
}

.status-cell {
  text-align: center;
}

.refresh-btn {
  background: #22c55e;
  color: black;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  margin: 20px auto;
  display: block;
  transition: all 0.3s ease;
}

.refresh-btn:hover {
  background: #16a34a;
  transform: scale(1.05);
}

.refresh-btn:disabled {
  background: #4b5563;
  cursor: not-allowed;
  transform: scale(1);
}

.loading {
  text-align: center;
  padding: 40px;
  color: #9ca3af;
  font-size: 18px;
}

.error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid #ef4444;
  color: #ef4444;
  padding: 20px;
  border-radius: 8px;
  margin: 20px 0;
  text-align: center;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #9ca3af;
}

.empty-state h3 {
  font-size: 24px;
  margin-bottom: 10px;
  color: #6b7280;
}

.footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px;
  color: #6b7280;
  font-size: 14px;
}

.malpractice-indicator {
  background: #ef4444;
  color: white;
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 11px;
  margin-left: 10px;
}

@media (max-width: 768px) {
  .leaderboard-container {
    padding: 10px;
  }
  
  .title {
    font-size: 32px;
  }
  
  .stats-row {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .leaderboard-table {
    font-size: 14px;
  }
  
  .leaderboard-table th,
  .leaderboard-table td {
    padding: 12px 10px;
  }
  
  .rank-cell {
    width: 60px;
    font-size: 16px;
  }
}
</style>

<body>
<div class="leaderboard-container">
  <div class="header">
    <h1 class="title">🏆 BugSugi Leaderboard</h1>
    <p class="subtitle">Real-time competition standings</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="totalParticipants">0</div>
      <div class="stat-label">Total Participants</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="completedCount">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="fastestTime">--:--</div>
      <div class="stat-label">Fastest Time</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="avgTime">--:--</div>
      <div class="stat-label">Average Time</div>
    </div>
  </div>

  <table class="leaderboard-table">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Team</th>
        <th>Completion Time</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="leaderboardBody">
      <tr>
        <td colspan="4" class="loading">Loading leaderboard data...</td>
      </tr>
    </tbody>
  </table>

  <div class="footer">
    <p>🔒 BugSugi Bug Fixing Competition • MVSR Engineering College</p>
    <p>Last updated: <span id="lastUpdated">Never</span></p>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- Configuration -->
<script src="config.js"></script>

<!-- Leaderboard Script -->
<script src="leaderboard.js"></script>
</body>
</html>
